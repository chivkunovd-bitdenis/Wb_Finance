[mypy]
python_version = 3.11
mypy_path = backend
exclude = (^|/)alembic/versions/

# SQLAlchemy models в проекте используются через ORM. Плагин позволяет mypy
# извлекать реальные типы полей вместо `Column[...]`.
plugins = sqlalchemy.ext.mypy.plugin

# Проект не использует полную строгость типизации; для внешних зависимостей
# допускаем отсутствие stubs, чтобы фокус оставался на внутренних типах.
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False

# Проект использует классический SQLAlchemy с `Column(...)`, поэтому mypy
# часто не может вывести точные типы (например, отличить `Column[int]`
# от `int` в выражениях/DTO).
# Чтобы mypy проходил, отключаем только наиболее шумные категории ошибок.
disable_error_code = arg-type, assignment, attr-defined

