services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wb_finance
      POSTGRES_PASSWORD: wb_finance
      POSTGRES_DB: wb_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb_finance -d wb_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image doesn't ship curl/wget; use bash TCP probe
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q \"200\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://wb_finance:wb_finance@postgres:5432/wb_finance
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Shared per-user WB storage_state snapshots (must be the same across api/worker/wb_auth)
      WB_PLAYWRIGHT_STORAGE_STATE_DIR: /app/data/wb_storage_states
      # Internal-only auth between api -> wb_auth manager (used for remote noVNC login flow)
      WB_AUTH_INTERNAL_TOKEN: ${WB_AUTH_INTERNAL_TOKEN:-dev-internal-token}
      # AI daily brief + внешние вызовы к LLM выключены по умолчанию
      DAILY_BRIEF_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/app:/app/app
      - ./backend/celery_app:/app/celery_app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/data:/app/data
    # entrypoint: при уже актуальной alembic_version пропускает upgrade (обход overlaps на head).
    command: ["python", "/app/docker_entrypoint_api.py"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 90s

  celery_worker:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://wb_finance:wb_finance@postgres:5432/wb_finance
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Shared per-user WB storage_state snapshots (must be the same across api/worker/wb_auth)
      WB_PLAYWRIGHT_STORAGE_STATE_DIR: /app/data/wb_storage_states
      DAILY_BRIEF_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/app:/app/app
      - ./backend/celery_app:/app/celery_app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/data:/app/data
      - ./backend/wb_storage_state.json:/app/wb_storage_state.json:ro
    command: celery -A celery_app.celery worker --loglevel=info

  celery_beat:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://wb_finance:wb_finance@postgres:5432/wb_finance
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Shared per-user WB storage_state snapshots (must be the same across api/worker/wb_auth)
      WB_PLAYWRIGHT_STORAGE_STATE_DIR: /app/data/wb_storage_states
      DAILY_BRIEF_ENABLED: "false"
      AI_DAILY_ANALYTICS_BEAT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/app:/app/app
      - ./backend/celery_app:/app/celery_app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/data:/app/data
    command: celery -A celery_app.celery beat --loglevel=info

  caddy:
    restart: unless-stopped
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8444:443"
      - "443:443/udp"
      - "8444:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/var/www/landing:ro
      - ./frontend/dist:/var/www/app:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - wb_auth

  wb_auth:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.wb_auth
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      WB_PLAYWRIGHT_STORAGE_STATE_DIR: /app/data/wb_storage_states
      # Internal-only auth between api -> wb_auth manager
      WB_AUTH_INTERNAL_TOKEN: ${WB_AUTH_INTERNAL_TOKEN:-dev-internal-token}
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    expose:
      - "6080"
      - "8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=5)",
        ]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  caddy_data:
  caddy_config:
