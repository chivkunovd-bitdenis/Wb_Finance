name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt ruff mypy

      # Как локально: корень репо + mypy.ini / pytest.ini
      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy .

      - name: Pytest
        run: pytest -q

  deploy:
    name: Deploy via SSH
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: SSH → pull → rebuild → migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/root/wb-finance"
            REPO_URL="https://github.com/chivkunovd-bitdenis/Wb_Finance.git"

            # Если папка не git-репо — клонируем заново, сохранив .env
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Not a git repo — cloning fresh..."
              if [ -f "$DEPLOY_DIR/backend/.env" ]; then
                cp "$DEPLOY_DIR/backend/.env" /tmp/wb_finance_env_backup
                echo ".env backed up"
              fi
              rm -rf "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
              if [ -f /tmp/wb_finance_env_backup ]; then
                cp /tmp/wb_finance_env_backup "$DEPLOY_DIR/backend/.env"
                echo ".env restored"
              fi
            fi

            cd "$DEPLOY_DIR"

            # Подтянуть последний код
            git pull origin main

            # Пересобрать и поднять все контейнеры (миграции — в entrypoint api,
            # см. backend/docker_entrypoint_api.py; повторный alembic здесь ломал
            # деплой при «overlaps», т.к. без логики skip из entrypoint)
            docker compose up -d --build

            echo "Deploy finished successfully"
