services:
  # Local dev override: avoid port collisions on host.
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    ports:
      - "127.0.0.1:6380:6379"

  qdrant:
    ports:
      - "127.0.0.1:6334:6333"

  api:
    ports:
      - "8001:8000"

  caddy:
    ports:
      - "8081:80"
      - "8444:443"
      - "8444:443/udp"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro

